<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Gestión de Proveedores</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root {
      --bg:        #0d0f14;
      --surface:   #161921;
      --surface2:  #1e2230;
      --border:    #2a2f42;
      --accent:    #4f8ef7;
      --accent2:   #7c5cfc;
      --success:   #34d399;
      --danger:    #f87171;
      --warning:   #fbbf24;
      --text:      #e8ecf4;
      --muted:     #6b7490;
      --radius:    12px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0;
      overflow-x: hidden;
    }

    /* ── HEADER ── */
    header {
      background: linear-gradient(135deg, #0d0f14 0%, #161921 100%);
      border-bottom: 1px solid var(--border);
      padding: 20px 40px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
      backdrop-filter: blur(12px);
    }
    .logo {
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .logo-icon {
      width: 42px; height: 42px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px;
    }
    .logo h1 {
      font-family: 'Syne', sans-serif;
      font-size: 1.4rem;
      font-weight: 800;
      letter-spacing: -0.5px;
    }
    .logo span { color: var(--accent); }

    .header-stats {
      display: flex;
      gap: 24px;
      align-items: center;
    }
    .stat-pill {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 6px 16px;
      font-size: 0.8rem;
      color: var(--muted);
    }
    .stat-pill strong { color: var(--text); }

    /* ── MAIN LAYOUT ── */
    main {
      max-width: 1300px;
      margin: 0 auto;
      padding: 32px 40px;
    }

    /* ── TOOLBAR ── */
    .toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 24px;
      gap: 16px;
      flex-wrap: wrap;
    }
    .search-box {
      position: relative;
      flex: 1;
      min-width: 220px;
      max-width: 380px;
    }
    .search-box input {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px 16px 10px 42px;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.9rem;
      outline: none;
      transition: border-color .2s;
    }
    .search-box input:focus { border-color: var(--accent); }
    .search-box::before {
      content: '🔍';
      position: absolute;
      left: 14px; top: 50%;
      transform: translateY(-50%);
      font-size: 14px;
      pointer-events: none;
    }

    .btn {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 10px 20px;
      border-radius: 10px;
      border: none;
      cursor: pointer;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.9rem;
      font-weight: 500;
      transition: all .2s;
    }
    .btn-primary {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: #fff;
    }
    .btn-primary:hover { opacity: .88; transform: translateY(-1px); }

    .btn-sm {
      padding: 6px 12px;
      font-size: 0.8rem;
      border-radius: 8px;
    }
    .btn-edit {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--accent);
    }
    .btn-edit:hover { border-color: var(--accent); background: rgba(79,142,247,.1); }
    .btn-delete {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--danger);
    }
    .btn-delete:hover { border-color: var(--danger); background: rgba(248,113,113,.1); }
    .btn-save {
      background: var(--success);
      color: #0d1a14;
      font-weight: 600;
    }
    .btn-save:hover { opacity: .88; }
    .btn-cancel {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--muted);
    }
    .btn-cancel:hover { color: var(--text); }

    /* ── TABLE ── */
    .table-wrapper {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }
    table {
      width: 100%;
      border-collapse: collapse;
    }
    thead {
      background: var(--surface2);
    }
    thead th {
      font-family: 'Syne', sans-serif;
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--muted);
      padding: 14px 18px;
      text-align: left;
      border-bottom: 1px solid var(--border);
      white-space: nowrap;
    }
    tbody tr {
      border-bottom: 1px solid var(--border);
      transition: background .15s;
    }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: var(--surface2); }

    td {
      padding: 14px 18px;
      font-size: 0.88rem;
      vertical-align: middle;
    }
    td.id-cell {
      font-family: 'Syne', sans-serif;
      color: var(--muted);
      font-size: 0.8rem;
      width: 60px;
    }
    td.actions-cell {
      text-align: right;
      white-space: nowrap;
      width: 120px;
    }
    td.actions-cell .btn { margin-left: 6px; }

    /* Inline edit row */
    tr.editing td { background: rgba(79,142,247,.05); }
    tr.editing td input, tr.editing td select {
      background: var(--bg);
      border: 1px solid var(--accent);
      border-radius: 7px;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.88rem;
      padding: 6px 10px;
      width: 100%;
      outline: none;
    }

    /* activo badge */
    .badge {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 0.75rem;
      font-weight: 500;
    }
    .badge-active { background: rgba(52,211,153,.15); color: var(--success); }
    .badge-inactive { background: rgba(248,113,113,.12); color: var(--danger); }

    /* ── MODAL (nuevo proveedor) ── */
    .overlay {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,.6);
      backdrop-filter: blur(6px);
      z-index: 200;
      align-items: center; justify-content: center;
    }
    .overlay.open { display: flex; }

    .modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 36px;
      width: 100%;
      max-width: 520px;
      animation: modalIn .25s ease;
    }
    @keyframes modalIn {
      from { opacity:0; transform: scale(.95) translateY(12px); }
      to   { opacity:1; transform: scale(1) translateY(0); }
    }
    .modal h2 {
      font-family: 'Syne', sans-serif;
      font-size: 1.3rem;
      font-weight: 700;
      margin-bottom: 24px;
    }
    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-bottom: 24px;
    }
    .form-group { display: flex; flex-direction: column; gap: 6px; }
    .form-group.full { grid-column: 1 / -1; }
    .form-group label {
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--muted);
      letter-spacing: .5px;
      text-transform: uppercase;
    }
    .form-group input, .form-group select {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 9px;
      padding: 10px 14px;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.9rem;
      outline: none;
      transition: border-color .2s;
    }
    .form-group input:focus, .form-group select:focus { border-color: var(--accent); }
    .form-group select option { background: var(--surface2); }

    .modal-footer {
      display: flex; gap: 12px; justify-content: flex-end;
    }

    /* ── TOAST ── */
    #toast {
      position: fixed;
      bottom: 30px; right: 30px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px 20px;
      font-size: 0.88rem;
      display: flex; align-items: center; gap: 10px;
      transform: translateY(80px);
      opacity: 0;
      transition: all .3s;
      z-index: 999;
      max-width: 320px;
    }
    #toast.show { transform: translateY(0); opacity: 1; }
    #toast.success { border-color: var(--success); color: var(--success); }
    #toast.error   { border-color: var(--danger);  color: var(--danger);  }

    /* ── EMPTY / LOADING ── */
    .empty-state {
      text-align: center; padding: 60px 20px; color: var(--muted);
    }
    .empty-state .icon { font-size: 3rem; margin-bottom: 12px; }
    .empty-state p { font-size: 1rem; }

    .loader {
      display: inline-block;
      width: 18px; height: 18px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin .7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── RESPONSIVE ── */
    @media (max-width: 768px) {
      main { padding: 20px 16px; }
      header { padding: 16px 20px; }
      .header-stats { display: none; }
      .form-grid { grid-template-columns: 1fr; }
      table { font-size: 0.82rem; }
      td, th { padding: 10px 12px; }
    }
  </style>
</head>
<body>

<!-- ── HEADER ── -->
<header>
  <div class="logo">
    <div class="logo-icon">🏢</div>
    <h1>Gestión de <span>Proveedores</span></h1>
  </div>
  <div class="header-stats">
    <div class="stat-pill">Total: <strong id="totalCount">–</strong></div>
    <div class="stat-pill">activos: <strong id="activeCount">–</strong></div>
  </div>
</header>

<!-- ── MAIN ── -->
<main>
  <div class="toolbar">
    <div class="search-box">
      <input type="text" id="searchInput" placeholder="Buscar proveedor…" oninput="filterTable()"/>
    </div>
    <button class="btn btn-primary" onclick="openModal()">＋ Nuevo Proveedor</button>
  </div>

  <div class="table-wrapper">
    <table>
      <thead>
        <tr>
          <th>ID</th>
          <th>Nombre</th>
          <th>Teléfono</th>
          <th>Dirección</th>
          <th>email</th>
          <th>Estado</th>
          <th>Creado</th>
          <th></th>
        </tr>
      </thead>
      <tbody id="tableBody">
        <tr><td colspan="8"><div class="empty-state"><div class="loader"></div></div></td></tr>
      </tbody>
    </table>
  </div>
</main>

<!-- ── MODAL NUEVO ── -->
<div class="overlay" id="overlay">
  <div class="modal">
    <h2>➕ Nuevo Proveedor</h2>
    <div class="form-grid">
      <div class="form-group full">
        <label>Nombre *</label>
        <input id="f_nombre" type="text" placeholder="Nombre o razón social"/>
      </div>
      <div class="form-group">
        <label>Teléfono</label>
        <input id="f_telefono" type="text" placeholder="Ej: 300 123 4567"/>
      </div>
      <div class="form-group">
        <label>email</label>
        <input id="f_email" type="email" placeholder="correo@empresa.com"/>
      </div>
      <div class="form-group full">
        <label>Dirección</label>
        <input id="f_direccion" type="text" placeholder="Calle, ciudad"/>
      </div>
      <div class="form-group">
        <label>Estado</label>
        <select id="f_activo">
          <option value="true">activo</option>
          <option value="false">Inactivo</option>
        </select>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-cancel" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-save" onclick="saveNew()">💾 Guardar</button>
    </div>
  </div>
</div>

<!-- ── TOAST ── -->
<div id="toast"></div>

<script>
  // ══════════════════════════════════════════════════
  // ⚙️  CONFIGURA TUS CREDENCIALES DE SUPABASE AQUÍ
  // ══════════════════════════════════════════════════
  const SUPABASE_URL  = 'https://vhnnsniunwrpwkhjrhrn.supabase.co';   // ← reemplaza
  const SUPABASE_KEY  = 'sb_publishable_no6MERezQoKQ_kBCA5w50Q_trrNP5hp';                          // ← reemplaza
  // ══════════════════════════════════════════════════

  const { createClient } = supabase;
  const sb = createClient(SUPABASE_URL, SUPABASE_KEY);
  const TABLE = 'tblproveedores';

  let allData = [];

  // ── INIT ──────────────────────────────────────────
  async function loadData() {
    const { data, error } = await sb
      .from(TABLE)
      .select('*')
      .order('idproveedor', { ascending: true });

    if (error) { toast('Error al cargar datos: ' + error.message, 'error'); return; }

    allData = data || [];
    updateStats();
    renderTable(allData);
  }

  function updateStats() {
    document.getElementById('totalCount').textContent  = allData.length;
    document.getElementById('activeCount').textContent = allData.filter(r => r.activo).length;
  }

  // ── RENDER ────────────────────────────────────────
  function renderTable(rows) {
    const tbody = document.getElementById('tableBody');
    if (!rows.length) {
      tbody.innerHTML = `<tr><td colspan="8">
        <div class="empty-state">
          <div class="icon">📭</div>
          <p>No hay proveedores registrados.</p>
        </div></td></tr>`;
      return;
    }

    tbody.innerHTML = rows.map(r => `
      <tr id="row-${r.idproveedor}">
        <td class="id-cell">#${r.idproveedor}</td>
        <td><strong>${esc(r.nombre)}</strong></td>
        <td>${esc(r.telefono || '—')}</td>
        <td>${esc(r.direccion || '—')}</td>
        <td>${esc(r.email || '—')}</td>
        <td>
          <span class="badge ${r.activo ? 'badge-active' : 'badge-inactive'}">
            ${r.activo ? '● activo' : '○ Inactivo'}
          </span>
        </td>
        <td style="color:var(--muted); font-size:.8rem">${formatDate(r.createdat)}</td>
        <td class="actions-cell">
          <button class="btn btn-sm btn-edit" onclick="startEdit(${r.idproveedor})">✏️ Editar</button>
          <button class="btn btn-sm btn-delete" onclick="deleteRow(${r.idproveedor})">🗑</button>
        </td>
      </tr>`).join('');
  }

  // ── INLINE EDIT ───────────────────────────────────
  function startEdit(id) {
    const row = allData.find(r => r.idproveedor === id);
    const tr  = document.getElementById('row-' + id);
    tr.classList.add('editing');
    tr.innerHTML = `
      <td class="id-cell">#${id}</td>
      <td><input id="e_nombre"    value="${esc(row.nombre   ||'')}"/></td>
      <td><input id="e_telefono"  value="${esc(row.telefono ||'')}"/></td>
      <td><input id="e_direccion" value="${esc(row.direccion||'')}"/></td>
      <td><input id="e_email"     value="${esc(row.email    ||'')}"/></td>
      <td>
        <select id="e_activo">
          <option value="true"  ${row.activo ? 'selected':''}>activo</option>
          <option value="false" ${!row.activo? 'selected':''}>Inactivo</option>
        </select>
      </td>
      <td style="color:var(--muted); font-size:.8rem">${formatDate(row.CreatedAt)}</td>
      <td class="actions-cell">
        <button class="btn btn-sm btn-save"   onclick="saveEdit(${id})">💾</button>
        <button class="btn btn-sm btn-cancel" onclick="loadData()">✕</button>
      </td>`;
  }

  async function saveEdit(id) {
    const updates = {
      nombre:    document.getElementById('e_nombre').value.trim(),
      telefono:  document.getElementById('e_telefono').value.trim(),
      direccion: document.getElementById('e_direccion').value.trim(),
      email:     document.getElementById('e_email').value.trim(),
      activo:    document.getElementById('e_activo').value === 'true',
      updatedat: new Date().toISOString()
    };
    if (!updates.nombre) { toast('El nombre es obligatorio.', 'error'); return; }

    const { error } = await sb.from(TABLE).update(updates).eq('idproveedor', id);
    if (error) { toast('Error al actualizar: ' + error.message, 'error'); return; }

    toast('Proveedor actualizado correctamente.', 'success');
    loadData();
  }

  // ── NUEVO ─────────────────────────────────────────
  function openModal()  { document.getElementById('overlay').classList.add('open'); }
  function closeModal() {
    document.getElementById('overlay').classList.remove('open');
    ['f_nombre','f_telefono','f_email','f_direccion'].forEach(id => document.getElementById(id).value = '');
    document.getElementById('f_activo').value = 'true';
  }

  async function saveNew() {
    const nombre = document.getElementById('f_nombre').value.trim();
    if (!nombre) { toast('El nombre es obligatorio.', 'error'); return; }

    const { error } = await sb.from(TABLE).insert([{
      nombre:    nombre,
      telefono:  document.getElementById('f_telefono').value.trim(),
      email:     document.getElementById('f_email').value.trim(),
      direccion: document.getElementById('f_direccion').value.trim(),
      activo:    document.getElementById('f_activo').value === 'true'
    }]);

    if (error) { toast('Error al guardar: ' + error.message, 'error'); return; }
    toast('Proveedor creado exitosamente.', 'success');
    closeModal();
    loadData();
  }

  // ── DELETE ────────────────────────────────────────
  async function deleteRow(id) {
    const row = allData.find(r => r.idproveedor === id);
    if (!confirm(`¿Eliminar a "${row?.nombre}"? Esta acción no se puede deshacer.`)) return;
    const { error } = await sb.from(TABLE).delete().eq('idproveedor', id);
    if (error) { toast('Error al eliminar: ' + error.message, 'error'); return; }
    toast('Proveedor eliminado.', 'success');
    loadData();
  }

  // ── SEARCH ────────────────────────────────────────
  function filterTable() {
    const q = document.getElementById('searchInput').value.toLowerCase();
    const filtered = allData.filter(r =>
      (r.nombre    || '').toLowerCase().includes(q) ||
      (r.email     || '').toLowerCase().includes(q) ||
      (r.telefono  || '').toLowerCase().includes(q) ||
      (r.direccion || '').toLowerCase().includes(q)
    );
    renderTable(filtered);
  }

  // ── UTILS ─────────────────────────────────────────
  function esc(str) {
    return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }
  function formatDate(d) {
    if (!d) return '—';
    return new Date(d).toLocaleDateString('es-CO', { day:'2-digit', month:'short', year:'numeric' });
  }

  let toastTimer;
  function toast(msg, type = 'success') {
    const el = document.getElementById('toast');
    el.textContent = (type === 'success' ? '✅ ' : '❌ ') + msg;
    el.className = `show ${type}`;
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => { el.className = ''; }, 3500);
  }

  // ── INIT ──────────────────────────────────────────
  loadData();
</script>
</body>
</html>
